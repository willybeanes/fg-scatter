<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>FanGraphs API Combo Tester</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0ede8;
      color: #1a1a1a;
      padding: 24px;
      font-size: 13px;
    }
    h1 { font-size: 20px; margin-bottom: 4px; }
    .subtitle { color: #666; margin-bottom: 20px; font-size: 13px; }
    .toolbar {
      display: flex; gap: 12px; align-items: center;
      background: #fff; border-radius: 12px; padding: 14px 18px;
      margin-bottom: 20px; border: 1px solid rgba(0,0,0,0.08);
      flex-wrap: wrap;
    }
    button {
      font-family: inherit; font-size: 13px; font-weight: 500;
      padding: 8px 18px; background: #1a1a1a; color: #fff;
      border: none; border-radius: 8px; cursor: pointer;
    }
    button:disabled { opacity: 0.4; cursor: default; }
    #progress-wrap { font-size: 13px; color: #666; }
    #progress-bar-outer {
      width: 200px; height: 8px; background: #eee; border-radius: 4px; overflow: hidden;
    }
    #progress-bar { height: 100%; background: #1a1a1a; width: 0%; transition: width 0.1s; }
    .summary {
      display: flex; gap: 20px; margin-bottom: 16px;
      font-size: 13px;
    }
    .summary span { font-weight: 600; }
    .summary .ok { color: #16a34a; }
    .summary .empty { color: #d97706; }
    .summary .err { color: #dc2626; }

    /* Results table */
    .results-outer {
      background: #fff; border-radius: 12px; padding: 16px;
      border: 1px solid rgba(0,0,0,0.08); overflow-x: auto;
    }
    table { border-collapse: collapse; width: 100%; }
    th, td {
      text-align: left; padding: 6px 10px;
      border-bottom: 1px solid #f0f0f0; white-space: nowrap;
    }
    th { font-weight: 600; font-size: 11px; text-transform: uppercase;
         letter-spacing: 0.4px; color: #666; background: #fafafa; }
    tr:hover td { background: #fafaf8; }
    .badge {
      display: inline-block; padding: 2px 8px; border-radius: 20px;
      font-size: 11px; font-weight: 600;
    }
    .badge-ok    { background: #dcfce7; color: #15803d; }
    .badge-empty { background: #fef9c3; color: #854d0e; }
    .badge-err   { background: #fee2e2; color: #b91c1c; }
    .badge-wait  { background: #f1f5f9; color: #64748b; }
    .badge-run   { background: #dbeafe; color: #1d4ed8; }
    .count { font-weight: 600; }
    td.dim { color: #888; }
    td.url-cell { font-family: monospace; font-size: 11px; color: #555;
                  max-width: 400px; overflow: hidden; text-overflow: ellipsis; }
    details > summary { cursor: pointer; }
  </style>
</head>
<body>
<div style="max-width:1400px;margin:0 auto">
  <h1>⚾ FanGraphs API Combo Tester</h1>
  <p class="subtitle">Fires every combination of split × pitcher type × mode and reports data counts or errors.</p>

  <div class="toolbar">
    <button id="btn-run">▶ Run All Tests</button>
    <button id="btn-stop" disabled>■ Stop</button>
    <label style="color:#666;font-size:12px;">
      Concurrency:
      <input id="inp-concur" type="number" value="6" min="1" max="20"
             style="width:50px;padding:4px 6px;border:1px solid #ccc;border-radius:6px;font-family:inherit;font-size:12px;">
    </label>
    <div id="progress-wrap" style="display:none">
      <div style="margin-bottom:4px" id="progress-text">0 / 0</div>
      <div id="progress-bar-outer"><div id="progress-bar"></div></div>
    </div>
  </div>

  <div class="summary" id="summary" style="display:none">
    <div>Total: <span id="s-total">0</span></div>
    <div class="ok">✓ Data: <span id="s-ok">0</span></div>
    <div class="empty">⚠ Empty: <span id="s-empty">0</span></div>
    <div class="err">✕ Error: <span id="s-err">0</span></div>
  </div>

  <div class="results-outer">
    <table id="tbl">
      <thead>
        <tr>
          <th>#</th>
          <th>Mode</th>
          <th>Split</th>
          <th>Type / Position</th>
          <th>League</th>
          <th>Group</th>
          <th>Qual</th>
          <th>Status</th>
          <th>Rows</th>
          <th>Details</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
</div>

<script>
const PROXY = 'https://fg-proxy.vercel.app/api/fangraphs';

// ── Test matrix ──────────────────────────────────────────────────────────────

const SPLITS = [
  { value: '0',  label: 'Full Season' },
  { value: '32', label: 'Last 7 Days' },
  { value: '33', label: 'Last 14 Days' },
  { value: '34', label: 'Last 30 Days' },
  { value: '35', label: 'First Half' },
  { value: '36', label: 'Second Half' },
  { value: '31', label: 'Mar/Apr' },
  { value: '2',  label: 'May' },
  { value: '3',  label: 'June' },
  { value: '4',  label: 'July' },
  { value: '5',  label: 'August' },
  { value: '6',  label: 'Sept/Oct' },
];

const PITCHER_TYPES = [
  { value: 'pit', label: 'All Pitchers', stats: 'pit', pos: 'all' },
  { value: 'sta', label: 'Starters',     stats: 'sta', pos: 'all' },
  { value: 'rel', label: 'Relievers',    stats: 'rel', pos: 'all' },
];

const HITTER_TYPES = [
  { value: 'bat', label: 'All Hitters', stats: 'bat', pos: 'all' },
  { value: 'bat-of', label: 'OF',       stats: 'bat', pos: 'of' },
];

const LEAGUES = [
  { value: 'all', label: 'All' },
  { value: 'al',  label: 'AL' },
  { value: 'nl',  label: 'NL' },
];

const GROUPS = [
  { value: 'player', label: 'Player' },
  { value: 'team',   label: 'Team' },
];

// Current season
const SEASON = '2026';

// ── Helper: same logic as in index.html ──────────────────────────────────────

function getFGSplitParams(splitValue, season) {
  const yr = String(season || new Date().getFullYear());
  const fmt = d => d.toISOString().slice(0, 10);
  const daysAgo = n => { const d = new Date(); d.setDate(d.getDate() - n); return fmt(d); };
  const today = fmt(new Date());
  switch (String(splitValue)) {
    case '0':  return { month: '1' };
    case '31': return { month: '1000', startdate: `${yr}-03-01`, enddate: `${yr}-05-01` };
    case '32': return { month: '1000', startdate: daysAgo(7),   enddate: today };
    case '33': return { month: '1000', startdate: daysAgo(14),  enddate: today };
    case '34': return { month: '1000', startdate: daysAgo(30),  enddate: today };
    case '35': return { month: '1000', startdate: `${yr}-03-01`, enddate: `${yr}-07-12` };
    case '36': return { month: '1000', startdate: `${yr}-07-12`, enddate: `${yr}-11-01` };
    default:   return { month: splitValue };
  }
}

// ── Build test cases ──────────────────────────────────────────────────────────

function buildTests() {
  const cases = [];

  // Pitching × all splits × AL/NL/all × player/team
  for (const split of SPLITS) {
    for (const pt of PITCHER_TYPES) {
      for (const lg of LEAGUES) {
        for (const grp of GROUPS) {
          const isRolling = ['32','33','34'].includes(split.value);
          const teamParam = grp.value === 'team' ? '0,ts' : '0';
          const qual = (grp.value === 'team' || isRolling) ? '0' : 'y';
          const params = new URLSearchParams({
            pos: 'all',
            stats: pt.stats,
            lg: lg.value,
            qual,
            type: '4',
            season: SEASON, season1: SEASON,
            ...getFGSplitParams(split.value, SEASON), ind: '0',
            hand: '',
            team: teamParam,
            pageitems: '10000', pagenum: '1',
            sortstat: 'WAR', sortdir: 'default'
          });
          cases.push({
            mode: 'pitching',
            split: split.label, splitVal: split.value,
            typeLabel: pt.label,
            lg: lg.label,
            group: grp.value,
            qual,
            url: `${PROXY}?${params}`,
          });
        }
      }
    }
  }

  // Hitting × rolling splits × player (the most common real-world use case subset)
  for (const split of SPLITS) {
    for (const ht of HITTER_TYPES) {
      const isRolling = ['32','33','34'].includes(split.value);
      const qual = isRolling ? '0' : 'y';
      const params = new URLSearchParams({
        pos: ht.pos,
        stats: ht.stats,
        lg: 'all',
        qual,
        type: '4',
        season: SEASON, season1: SEASON,
        ...getFGSplitParams(split.value), ind: '0',
        hand: '',
        team: '0',
        pageitems: '10000', pagenum: '1',
        sortstat: 'WAR', sortdir: 'default'
      });
      cases.push({
        mode: 'hitting',
        split: split.label, splitVal: split.value,
        typeLabel: ht.label,
        lg: 'All',
        group: 'player',
        qual,
        url: `${PROXY}?${params}`,
      });
    }
  }

  return cases;
}

// ── Render helpers ────────────────────────────────────────────────────────────

const tbody = document.getElementById('tbody');
const rows = [];

function renderRow(i, tc) {
  const tr = document.createElement('tr');
  tr.id = `row-${i}`;
  tr.innerHTML = `
    <td class="dim">${i + 1}</td>
    <td>${tc.mode}</td>
    <td>${tc.split}</td>
    <td>${tc.typeLabel}</td>
    <td>${tc.lg}</td>
    <td>${tc.group}</td>
    <td>${tc.qual}</td>
    <td id="st-${i}"><span class="badge badge-wait">waiting</span></td>
    <td id="ct-${i}" class="count dim">—</td>
    <td id="det-${i}" class="url-cell" title="${tc.url}"></td>
  `;
  tbody.appendChild(tr);
  rows.push(tr);
}

function setStatus(i, status, count, detail) {
  const st = document.getElementById(`st-${i}`);
  const ct = document.getElementById(`ct-${i}`);
  const det = document.getElementById(`det-${i}`);
  if (status === 'running') {
    st.innerHTML = `<span class="badge badge-run">running</span>`;
    ct.textContent = '…';
  } else if (status === 'ok') {
    st.innerHTML = `<span class="badge badge-ok">✓ ok</span>`;
    ct.textContent = count;
    ct.className = 'count';
    det.textContent = '';
  } else if (status === 'empty') {
    st.innerHTML = `<span class="badge badge-empty">⚠ empty</span>`;
    ct.textContent = '0';
    ct.className = 'count';
    det.textContent = detail || '';
  } else if (status === 'error') {
    st.innerHTML = `<span class="badge badge-err">✕ error</span>`;
    ct.textContent = '—';
    ct.className = 'count dim';
    det.textContent = detail || 'error';
  }
  updateSummary();
}

function updateSummary() {
  let ok = 0, empty = 0, err = 0, total = 0;
  for (const tr of rows) {
    const badge = tr.querySelector('.badge');
    if (!badge) continue;
    total++;
    if (badge.classList.contains('badge-ok')) ok++;
    else if (badge.classList.contains('badge-empty')) empty++;
    else if (badge.classList.contains('badge-err')) err++;
  }
  document.getElementById('s-total').textContent = rows.length;
  document.getElementById('s-ok').textContent = ok;
  document.getElementById('s-empty').textContent = empty;
  document.getElementById('s-err').textContent = err;
}

// ── Run logic ─────────────────────────────────────────────────────────────────

let stopped = false;

async function runTest(i, tc) {
  setStatus(i, 'running');
  try {
    const resp = await fetch(tc.url);
    if (!resp.ok) {
      setStatus(i, 'error', null, `HTTP ${resp.status}`);
      return;
    }
    const json = await resp.json();
    if (json.error) { setStatus(i, 'error', null, json.error); return; }
    const data = json.data || [];
    if (data.length === 0) {
      setStatus(i, 'empty', 0, 'API returned 0 rows');
    } else {
      setStatus(i, 'ok', data.length);
    }
  } catch (e) {
    setStatus(i, 'error', null, e.message);
  }
}

async function runAll() {
  stopped = false;
  tbody.innerHTML = '';
  rows.length = 0;
  document.getElementById('summary').style.display = 'flex';

  const tests = buildTests();
  tests.forEach((tc, i) => renderRow(i, tc));

  document.getElementById('btn-run').disabled = true;
  document.getElementById('btn-stop').disabled = false;
  const progressWrap = document.getElementById('progress-wrap');
  progressWrap.style.display = 'flex';
  progressWrap.style.flexDirection = 'column';
  progressWrap.style.gap = '4px';

  const concur = Math.max(1, Math.min(20, parseInt(document.getElementById('inp-concur').value) || 6));
  let idx = 0;
  let done = 0;
  const total = tests.length;

  function updateProgress() {
    document.getElementById('progress-text').textContent = `${done} / ${total}`;
    document.getElementById('progress-bar').style.width = `${Math.round(done / total * 100)}%`;
  }
  updateProgress();

  async function worker() {
    while (idx < total && !stopped) {
      const i = idx++;
      await runTest(i, tests[i]);
      done++;
      updateProgress();
    }
  }

  const workers = Array.from({ length: concur }, () => worker());
  await Promise.all(workers);

  document.getElementById('btn-run').disabled = false;
  document.getElementById('btn-stop').disabled = true;
  updateSummary();
}

document.getElementById('btn-run').addEventListener('click', runAll);
document.getElementById('btn-stop').addEventListener('click', () => { stopped = true; });
</script>
</body>
</html>
