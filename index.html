const ABARREL_KEYS = new Set(['aBarrels', 'aBarrel%', 'aBarrelPA%']);
let _aBarrelCache = null; // single cached fetch (full-season snapshot, no year param)

function _normName(name) {
  // Normalize to lowercase ASCII for fuzzy name matching
  return (name || '').toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g, '').replace(/[^a-z ]/g, '').trim();
}

async function fetchABarrelData() {
  if (_aBarrelCache) return _aBarrelCache;
  const resp = await fetch(ABARREL_SHEET_URL);
  const text = await resp.text();
  const lines = text.replace(/^﻿/, '').trim().split('\n');
  const headers = lines[0].split(',').map(h => h.trim());
  const map = new Map();
  for (let i = 1; i < lines.length; i++) {
    const cols = lines[i].split(',');
    const row = {};
    headers.forEach((h, j) => { row[h] = (cols[j] || '').trim(); });
    const name = _normName(row['Player']);
    if (!name) continue;
    map.set(name, {
      aBarrels:    parseFloat(row['aBarrels'])    || null,
      aBarrelBBE:  parseFloat(row['aBrl/BBE%'])  != null ? parseFloat(row['aBrl/BBE%'])  / 100 : null,
      aBarrelPA:   parseFloat(row['aBrl/PA%'])   != null ? parseFloat(row['aBrl/PA%'])   / 100 : null,
    });
  }
  _aBarrelCache = map;
  return map;
}

// ── Baseball Prospectus Arsenal Pro data ──────────────────────────────────────
// Source: BP leaderboards API, arsenalpro_lb tab
// Matched to scatter data via mlbid = xMLBAMID
const BP_ARSENAL_KEYS = new Set(['StuffPro','PitchPro','SurpriseFactor','MovementSpread','VelocitySpread','PitchTypeProb','ExpSwStr','ExpDamage']);
const _bpCache = new Map();

async function fetchBPArsenal(season) {
  if (_bpCache.has(season)) return _bpCache.get(season);
  const resp = await fetch(`${BP_PROXY}?season=${season}`);
  if (!resp.ok) throw new Error(`BP Arsenal HTTP ${resp.status}`);
  const json = await resp.json();
  if (json.error) throw new Error(`BP Arsenal: ${json.error}`);
  const map = new Map();
  for (const row of (json.results || [])) {
    const mlbid = String(row.mlbid || '');
    if (!mlbid) continue;
    map.set(mlbid, {
      StuffPro:       row.stuffpro_agg        ?? null,
      PitchPro:       row.pitchpro_agg        ?? null,
      SurpriseFactor: row.surprise_factor     ?? null,
      MovementSpread: row.movement_spread     ?? null,
      VelocitySpread: row.velocity_spread     ?? null,
      PitchTypeProb:  row.pitch_type_probability ?? null,
      ExpSwStr:       row.exp_swstr_rate      ?? null,
      ExpDamage:      row.exp_damage          ?? null,
    });
  }
  _bpCache.set(season, map);
  return map;
}

// ── Baseball Prospectus Hitting data (SLGCON, EV90, SEAGER) ──────────────────
// Source: BP leaderboards/api/v1/hitting, matched via mlbid = xMLBAMID
const BP_HITTING_KEYS = new Set(['SLGCON','EV90','BP_SEAGER']);
const _bpHittingCache = new Map();

async function fetchBPHitting(season) {
  if (_bpHittingCache.has(season)) return _bpHittingCache.get(season);
  const resp = await fetch(`${BP_HITTING_PROXY}?season=${season}`);
  if (!resp.ok) throw new Error(`BP Hitting HTTP ${resp.status}`);
  const json = await resp.json();
  if (json.error) throw new Error(`BP Hitting: ${json.error}`);
  const map = new Map();
  for (const row of (json.results || [])) {
    const mlbid = String(row.mlbid || '');
    if (!mlbid) continue;
    map.set(mlbid, {
      SLGCON:    row.slgcon                 ?? null,
      EV90:      row.exit_velocity_90_agg   ?? null,
      BP_SEAGER: row.seager_agg             ?? null,
    });
  }
  _bpHittingCache.set(season, map);
  return map;
}

// Cache rookie player ID sets by "season:stats" key.
// Fetches with ind=2 (full-season, no split) and caches the Set<playerid>.
const _rookieIdCache = new Map();
async function fetchRookieIds(season, stats) {
  const key = `${season}:${stats}`;
  if (_rookieIdCache.has(key)) return _rookieIdCache.get(key);
  const params = new URLSearchParams({
    pos: 'all', stats, lg: 'all', qual: '0', type: '4',
    season, season1: season, month: '0', ind: '2',
    pageitems: '10000', pagenum: '1', sortstat: 'WAR', sortdir: 'default',
  });
  const resp = await fetch(`${PROXY}?${params}`);
  const json = await resp.json();
  const ids = new Set((json.data || []).map(p => String(p.playerid)));
  _rookieIdCache.set(key, ids);
  return ids;
}

async function generate() {
  const season = selSeason.value;
  const isCombined = currentMode === 'combined';
  const isTeam = isCombined || selGroup.value === 'team';
  const isHitting = currentMode === 'hitting';
  currentPrevYearSeason = null; // reset each run

  // Rookie filter: FanGraphs ind=2 is ignored when split params are active,
  // so we always fetch all players (ind=0) and filter client-side against a
  // separately fetched rookie ID set (cached per season+stats).
  // Not applicable to team/combined mode — disable the checkbox there.
  const rookieAvailable = !isTeam;
  lblRookie.style.opacity = rookieAvailable ? '' : '0.4';
  chkRookie.disabled = !rookieAvailable;
  const indParam = '0';

  // Update URL with current state
  const urlState = new URLSearchParams({ mode: currentMode, season, split: selSplit.value });
  if (!isCombined) {
    urlState.set('stats', selStats.value);
    urlState.set('lg', selLg.value);
    urlState.set('hand', selHand.value);
    urlState.set('qual', selQual.value);
    urlState.set('team', selTeam.value);
    urlState.set('group', selGroup.value);
  }
  urlState.set('x', selX.value);
  urlState.set('y', selY.value);
  if (selColor.value !== 'none') urlState.set('color', selColor.value);
  urlState.set('size', currentDotScale);
  if (chkR2.checked) urlState.set('r2', '1');
  if (chkRookie.checked) urlState.set('rookie', '1');
  history.replaceState(null, '', '?' + urlState.toString());

  btnGenerate.disabled = true;
  exportBtns.style.display = 'none';
  sizeToggle.style.display = 'none';
  chartStatus.textContent = 'Loading...';
  chartStatus.classList.remove('error');
  chartStatus.style.display = 'flex';
  plotArea.innerHTML = '';
  hiddenKeys.clear();
  zoomState = null;
  tappedDotKey = null;
  currentScale = null;
  btnReset.style.display = 'none';

  try {
    if (isCombined) {
      // Fetch team-level batting and pitching data in parallel using team=0,ts
      const baseParams = { pos: 'all', lg: selLg.value, qual: '0', type: '4', season, season1: season, ...getFGSplitParams(selSplit.value, season), ind: indParam, hand: '', team: '0,ts', pageitems: '100', pagenum: '1', sortstat: 'WAR', sortdir: 'default' };
      const [batResp, pitResp] = await Promise.all([
        fetch(`${PROXY}?${new URLSearchParams({ ...baseParams, stats: 'bat' })}`),
        fetch(`${PROXY}?${new URLSearchParams({ ...baseParams, stats: 'pit' })}`)
      ]);
      if (!batResp.ok || !pitResp.ok) throw new Error('HTTP error fetching data');
      const [batJson, pitJson] = await Promise.all([batResp.json(), pitResp.json()]);
      if (batJson.error) throw new Error(batJson.error);
      if (pitJson.error) throw new Error(pitJson.error);

      const hitTeams = (batJson.data || []).map(t => ({ ...t, TeamNameAbb: t.TeamName || t.TeamNameAbb }));
      const pitTeams = (pitJson.data || []).map(t => ({ ...t, TeamNameAbb: t.TeamName || t.TeamNameAbb }));

      // Merge by team abbreviation
      const pitMap = {};
      for (const t of pitTeams) pitMap[t.TeamNameAbb] = t;
      currentData = hitTeams.map(ht => {
        const pt = pitMap[ht.TeamNameAbb] || {};
        const merged = { _isTeam: true, TeamNameAbb: ht.TeamNameAbb, TeamName: ht.TeamNameAbb, PlayerName: ht.TeamNameAbb };
        for (const k of Object.keys(ht)) {
          if (['TeamNameAbb','TeamName','PlayerName','Name','Team'].includes(k)) continue;
          merged['hit_' + k] = ht[k];
        }
        for (const k of Object.keys(pt)) {
          if (['TeamNameAbb','TeamName','PlayerName','Name','Team'].includes(k)) continue;
          merged['pit_' + k] = pt[k];
        }
        merged.total_WAR = (ht.WAR || 0) + (pt.WAR || 0);
        return merged;
      }).filter(t => t.TeamNameAbb);

      currentGroupBy = 'team';
    } else if (isTeam) {
      // Use team=0,ts for FanGraphs' own team aggregation (accurate for traded players)
      const teamParam = selTeam.value === '0' ? '0,ts' : selTeam.value;
      const params = new URLSearchParams({
        pos: isHitting ? selStats.value : 'all',
        stats: isHitting ? 'bat' : selStats.value,
        lg: selLg.value,
        qual: '0',
        type: '4',
        season, season1: season,
        ...getFGSplitParams(selSplit.value, season), ind: indParam,
        hand: selHand.value,
        team: teamParam,
        pageitems: '10000', pagenum: '1',
        sortstat: 'WAR', sortdir: 'default'
      });
      const resp = await fetch(`${PROXY}?${params}`);
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      const json = await resp.json();
      if (json.error) throw new Error(json.error);
      const teams = json.data;
      if (!teams || !teams.length) throw new Error('No data returned');

      currentGroupBy = 'team';
      currentData = teams.map(t => ({
        ...t, _isTeam: true,
        TeamNameAbb: t.TeamName || t.TeamNameAbb,
        PlayerName: t.TeamName || t.TeamNameAbb,
      }));
    } else {
      const effectiveQual = selQual.value;

      // When using month=1000 (custom date range), FanGraphs' team filter is
      // unreliable — it silently drops players.  Always fetch team=0 for these
      // splits and apply the team filter client-side instead.
      const fgSplitParams = getFGSplitParams(selSplit.value, season);
      const usesCustomRange = fgSplitParams.month === '1000';
      const wantTeam = selTeam.value !== '0';
      const apiTeam = (usesCustomRange && wantTeam) ? '0' : selTeam.value;

      const params = new URLSearchParams({
        pos: isHitting ? selStats.value : 'all',
        stats: isHitting ? 'bat' : selStats.value,
        lg: selLg.value,
        qual: effectiveQual,
        type: '4',
        season, season1: season,
        ...fgSplitParams, ind: indParam,
        hand: selHand.value,
        team: apiTeam,
        pageitems: '10000', pagenum: '1',
        sortstat: 'WAR', sortdir: 'default'
      });
      const resp = await fetch(`${PROXY}?${params}`);
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      const json = await resp.json();
      if (json.error) throw new Error(json.error);
      let players = json.data;
      if (!players || !players.length) throw new Error('No data returned');

      // Client-side team filter (only needed when we bypassed the API filter above)
      if (usesCustomRange && wantTeam) {
        const teamAbbr = selTeam.options[selTeam.selectedIndex].textContent.trim();
        players = players.filter(p => p.TeamNameAbb === teamAbbr || p.Team === teamAbbr);
        if (!players.length) throw new Error('No data returned');
      }

      currentGroupBy = 'player';
      currentData = players;
    }

    // Rookie filter — fetch a full-season ind=2 ID set and filter client-side
    // so it works correctly even when splits are active (FG ignores ind=2 with splits).
    if (rookieAvailable && chkRookie.checked) {
      try {
        const statsParam = isHitting ? 'bat' : (selStats.value || 'pit');
        const rookieIds = await fetchRookieIds(season, statsParam);
        currentData = currentData.filter(p => rookieIds.has(String(p.playerid)));
        if (!currentData.length) throw new Error('No rookie data found for these filters');
      } catch (rookieErr) {
        if (rookieErr.message.includes('rookie')) throw rookieErr;
        // Non-fatal: network error fetching rookie list — show all players
        console.warn('Rookie ID fetch failed:', rookieErr.message);
      }
    }

    // Compute composite stats
    for (const p of currentData) {
      p['SV+HLD'] = (p.SV || 0) + (p.HLD || 0);
      p['SV+HLD+W'] = (p.SV || 0) + (p.HLD || 0) + (p.W || 0);
      p['SB+CS'] = (p.SB || 0) + (p.CS || 0);
      p['XBH']   = (p['2B'] || 0) + (p['3B'] || 0) + (p.HR || 0);
      p['TOB'] = (p.H || 0) + (p.BB || 0) + (p.HBP || 0);
      // wOBACON = wOBA restricted to contact (no BB/HBP in numerator or denominator)
      // Weights from FanGraphs Guts (2024): 1B=0.882, 2B=1.254, 3B=1.590, HR=2.050
      // Denominator: AB - SO + SF  (balls put in play incl. HR and sac flies)
      const _wOBACON_d = (p.AB || 0) - (p.SO || 0) + (p.SF || 0);
      p['wOBACON'] = _wOBACON_d > 0
        ? (0.882*(p['1B']||0) + 1.254*(p['2B']||0) + 1.590*(p['3B']||0) + 2.050*(p.HR||0)) / _wOBACON_d
        : null;
    }
    if (isHitting) addSSEAGER(currentData);

    // Fetch previous season data when Y = "Prev Year (Same Stat)"
    if (selY.value === '__prev_year__' && !isCombined) {
      const prevSeason = String(parseInt(season) - 1);
      // Team mode: no qualifier filter (use all teams); player mode: 50 IP / 200 PA
      const prevQual = isTeam ? '0' : (isHitting ? '200' : '50');
      const prevParams = new URLSearchParams({
        pos: 'all',
        stats: isHitting ? 'bat' : selStats.value,
        lg: 'all',
        qual: prevQual,
        type: '4',
        season: prevSeason, season1: prevSeason,
        month: '0', ind: indParam,
        hand: '', team: isTeam ? '0,ts' : '0',
        pageitems: '10000', pagenum: '1',
        sortstat: 'WAR', sortdir: 'default'
      });
      try {
        const prevResp = await fetch(`${PROXY}?${prevParams}`);
        if (prevResp.ok) {
          const prevJson = await prevResp.json();
          if (!prevJson.error && prevJson.data?.length) {
            let prevPlayers = prevJson.data;

            // Compute composites on prev year data so they work as X axes
            for (const p of prevPlayers) {
              p['SV+HLD'] = (p.SV || 0) + (p.HLD || 0);
              p['SV+HLD+W'] = (p.SV || 0) + (p.HLD || 0) + (p.W || 0);
              p['SB+CS'] = (p.SB || 0) + (p.CS || 0);
              p['XBH']   = (p['2B'] || 0) + (p['3B'] || 0) + (p.HR || 0);
              p['TOB'] = (p.H || 0) + (p.BB || 0) + (p.HBP || 0);
              const _wOBACON_d = (p.AB || 0) - (p.SO || 0) + (p.SF || 0);
              p['wOBACON'] = _wOBACON_d > 0
                ? (0.882*(p['1B']||0) + 1.254*(p['2B']||0) + 1.590*(p['3B']||0) + 2.050*(p.HR||0)) / _wOBACON_d
                : null;
            }
            if (isHitting) addSSEAGER(prevPlayers);

            // If X is a Savant stat, enrich prev year players with Savant data.
            const xBkPrev = selX.value.replace(/^(hit_|pit_)/, '');
            const savantDetail = SAVANT_FIELD_DETAIL[xBkPrev];
            if (savantDetail) {
              try {
                const lbType = (isHitting ? 'batter' : 'pitcher') + (isTeam ? '-team' : '');
                const skipKeys = isHitting ? new Set(['xERA']) : new Set(['xwOBA', 'xSLG']);
                if (savantDetail.leaderEp === 'batted_ball') {
                  const bbPrevRows = await fetchSavantBattedBall(prevSeason, isHitting ? 'batter' : 'pitcher');
                  prevPlayers = applySavantRows(prevPlayers, { battedBall: bbPrevRows }, isTeam, '', skipKeys, false);
                } else if (savantDetail.leaderEp === 'bat_tracking') {
                  const btPlayerType = isHitting ? 'batter' : 'pitcher';
                  if (savantDetail.leaderCol) {
                    // Use leaderboard with seasonStart/seasonEnd for correct prior-year values
                    const btRows = await fetchSavantBatTracking(prevSeason, btPlayerType);
                    prevPlayers = applySavantRows(prevPlayers, { search: null, statcast: null, expected: null, batTracking: btRows }, isTeam, '', skipKeys, false);
                  } else if (savantDetail.searchCol) {
                    // Search-only stats (AttackAngle, AttackDir, SwingTilt) — no leaderboard column
                    const srchGroup = isTeam ? 'team' : 'name';
                    const srchRows = await fetchSavantSearch(btPlayerType, srchGroup, prevSeason, null);
                    prevPlayers = applySavantRows(prevPlayers, { search: srchRows, statcast: null, expected: null }, isTeam, '', skipKeys, true);
                  }
                } else if (savantDetail.leaderEp === 'custom') {
                  const playerType = isHitting ? 'batter' : 'pitcher';
                  const customRows = await fetchSavantCustom(playerType, prevSeason, savantDetail.selections);
                  prevPlayers = applySavantRows(prevPlayers, { search: null, statcast: null, expected: null, custom: customRows }, isTeam, '', skipKeys, false);
                } else {
                  const [scRows, expRows] = await Promise.all([
                    savantDetail.leaderEp === 'statcast'
                      ? fetchSavantLeaderboard(lbType, 'statcast', prevSeason)
                      : Promise.resolve(null),
                    savantDetail.leaderEp === 'expected_statistics'
                      ? fetchSavantLeaderboard(lbType, 'expected_statistics', prevSeason)
                      : Promise.resolve(null),
                  ]);
                  prevPlayers = applySavantRows(prevPlayers, { search: null, statcast: scRows, expected: expRows }, isTeam, '', skipKeys, false);
                }
              } catch (savantPrevErr) {
                console.warn('Prev year Savant fetch failed:', savantPrevErr.message);
              }
            }

            // If X is a BP Hitting stat, enrich prev year players with BP hitting data.
            if (isHitting && !isTeam && BP_HITTING_KEYS.has(xBkPrev)) {
              try {
                const bpHitMap = await fetchBPHitting(prevSeason);
                for (const p of prevPlayers) {
                  const mlbid = String(p.xMLBAMID || '');
                  const bh = bpHitMap.get(mlbid);
                  p['SLGCON']    = bh?.SLGCON    ?? null;
                  p['EV90']      = bh?.EV90      ?? null;
                  p['BP_SEAGER'] = bh?.BP_SEAGER ?? null;
                }
              } catch (bpHitPrevErr) {
                console.warn('Prev year BP Hitting fetch failed:', bpHitPrevErr.message);
              }
            }

            // If X is a BP Arsenal stat, enrich prev year players with BP data.
            if (!isHitting && !isTeam && BP_ARSENAL_KEYS.has(xBkPrev)) {
              try {
                const bpMap = await fetchBPArsenal(prevSeason);
                for (const p of prevPlayers) {
                  const mlbid = String(p.xMLBAMID || '');
                  const bp = bpMap.get(mlbid);
                  p['StuffPro']       = bp?.StuffPro       ?? null;
                  p['PitchPro']       = bp?.PitchPro        ?? null;
                  p['SurpriseFactor'] = bp?.SurpriseFactor  ?? null;
                  p['MovementSpread'] = bp?.MovementSpread  ?? null;
                  p['VelocitySpread'] = bp?.VelocitySpread  ?? null;
                  p['PitchTypeProb']  = bp?.PitchTypeProb   ?? null;
                  p['ExpSwStr']       = bp?.ExpSwStr         ?? null;
                  p['ExpDamage']      = bp?.ExpDamage        ?? null;
                }
              } catch (bpPrevErr) {
                console.warn('Prev year BP Arsenal fetch failed:', bpPrevErr.message);
              }
            }

            const xKeyRaw = selX.value;
            const prevMap = {};
            for (const p of prevPlayers) {
              // Team mode: key by TeamName (FG's team abbr); player mode: key by playerid
              const key = isTeam ? (p.TeamName || p.TeamNameAbb) : p.playerid;
              if (key != null) prevMap[key] = p[xKeyRaw] ?? null;
            }
            for (const p of currentData) {
              const key = isTeam ? (p.TeamName || p.TeamNameAbb) : p.playerid;
              p['__prev_year__'] = prevMap[key] ?? null;
            }
            currentPrevYearSeason = parseInt(prevSeason);
          }
        }
      } catch (prevErr) {
        console.warn('Prev year fetch failed:', prevErr.message);
      }
    }

    // Enrich with fresh Baseball Savant data for statcast/xstat metrics
    const xBk = baseKey(selX.value), yBk = baseKey(selY.value);
    const colorBk = selColor.value !== 'none' ? baseKey(selColor.value) : null;
    // All three axes (x, y, color) may need Savant enrichment
    const axisKeys = [xBk, yBk, ...(colorBk ? [colorBk] : [])];
    try {
      // Combined mode always uses leaderboard (no split controls shown)
      const dateRange = isCombined ? null : getSavantDateRange(selSplit.value, season);
      const useSearch = dateRange !== null;

      // Warn if a split is active but any axis stat can't support splits (no searchCol)
      if (useSearch) {
        const optionLabel = key => {
          for (const sel of [selX, selY, selColor]) {
            const opt = [...sel.options].find(o => o.value === key);
            if (opt) return opt.text;
          }
          return key;
        };
        const incompatibleKeys = [...new Set(
          axisKeys
            .map(k => baseKey(k))
            .filter(k => ABARREL_KEYS.has(k) || (SAVANT_FIELD_DETAIL[k] && (SAVANT_FIELD_DETAIL[k].searchCol === null || SAVANT_FIELD_DETAIL[k].leaderEp === 'custom')))
        )];
        if (incompatibleKeys.length) showSplitWarning(incompatibleKeys.map(optionLabel));
      }

      // Helper: does any axis need a particular leaderboard endpoint?
      const needsLbEp = ep => axisKeys.some(k => SAVANT_FIELD_DETAIL[k]?.leaderEp === ep);
      // Does any axis have a savant key at all?
      const needsAnySavant = axisKeys.some(k => SAVANT_FIELD_DETAIL[k]);
      // Bat tracking stats that have a searchCol — need statcast_search even in full-season mode
      const needsBtSearch = isHitting && axisKeys.some(k => {
        const d = SAVANT_FIELD_DETAIL[k];
        return d?.leaderEp === 'bat_tracking' && !!d.searchCol;
      });
      // Does any axis need statcast_search (has a searchCol)?
      const needsSearch = needsBtSearch || (useSearch && axisKeys.some(k => SAVANT_FIELD_DETAIL[k]?.searchCol));
      // Do we still need leaderboard even in search mode?
      const needsLbEvenWithSearch = useSearch && axisKeys.some(k => SAVANT_FIELD_DETAIL[k] && !SAVANT_FIELD_DETAIL[k].searchCol && SAVANT_FIELD_DETAIL[k].leaderEp !== 'bat_tracking');
      // Bat tracking leaderboard: hitters OR pitchers (against), always full-season player-level
      const needsBatTracking = !isTeam && axisKeys.some(k => {
        const d = SAVANT_FIELD_DETAIL[k];
        return d?.leaderEp === 'bat_tracking' && !!d.leaderCol;
      });
      // Batted-ball direction leaderboard: always full-season, player-level
      const needsBattedBall = !isTeam && axisKeys.some(k => SAVANT_FIELD_DETAIL[k]?.leaderEp === 'batted_ball');
      // Custom leaderboard stats (e.g. xwOBACON) — always full-season, player-level only
      const customSelections = axisKeys.flatMap(k => SAVANT_FIELD_DETAIL[k]?.leaderEp === 'custom' ? SAVANT_FIELD_DETAIL[k].selections : []);
      const needsCustom = !isTeam && customSelections.length > 0;

      if (isCombined) {
        // Combined: hit_ and pit_ sides use leaderboard
        const xIsHit = selX.value.startsWith('hit_'), yIsHit = selY.value.startsWith('hit_');
        const xIsPit = selX.value.startsWith('pit_'), yIsPit = selY.value.startsWith('pit_');
        const hitNeedsSC  = (xIsHit && SAVANT_FIELD_DETAIL[xBk]?.leaderEp === 'statcast')            || (yIsHit && SAVANT_FIELD_DETAIL[yBk]?.leaderEp === 'statcast');
        const hitNeedsExp = (xIsHit && SAVANT_FIELD_DETAIL[xBk]?.leaderEp === 'expected_statistics') || (yIsHit && SAVANT_FIELD_DETAIL[yBk]?.leaderEp === 'expected_statistics');
        const pitNeedsSC  = (xIsPit && SAVANT_FIELD_DETAIL[xBk]?.leaderEp === 'statcast')            || (yIsPit && SAVANT_FIELD_DETAIL[yBk]?.leaderEp === 'statcast');
        const pitNeedsExp = (xIsPit && SAVANT_FIELD_DETAIL[xBk]?.leaderEp === 'expected_statistics') || (yIsPit && SAVANT_FIELD_DETAIL[yBk]?.leaderEp === 'expected_statistics');
        const [hitSC, hitExp, pitSC, pitExp] = await Promise.all([
          hitNeedsSC  ? fetchSavantLeaderboard('batter-team',  'statcast',            season) : null,
          hitNeedsExp ? fetchSavantLeaderboard('batter-team',  'expected_statistics', season) : null,
          pitNeedsSC  ? fetchSavantLeaderboard('pitcher-team', 'statcast',            season) : null,
          pitNeedsExp ? fetchSavantLeaderboard('pitcher-team', 'expected_statistics', season) : null,
        ].map(p => p instanceof Promise ? p : Promise.resolve(p)));
        if (hitSC || hitExp) currentData = applySavantRows(currentData, { search: null, statcast: hitSC, expected: hitExp }, true, 'hit_', new Set(['xERA']));
        if (pitSC || pitExp) currentData = applySavantRows(currentData, { search: null, statcast: pitSC, expected: pitExp }, true, 'pit_', new Set());

      } else if (needsAnySavant) {
        const playerType = isHitting ? 'batter' : 'pitcher';
        const lbType     = playerType + (isTeam ? '-team' : '');
        const srchGroup  = isTeam ? 'team' : 'name';
        const skipKeys   = isHitting ? new Set(['xERA']) : new Set();

        const [srchRows, scRows, expRows, btRows, bbRows, customRows] = await Promise.all([
          // statcast_search: one call covers all searchCol stats for any date range
          needsSearch ? fetchSavantSearch(playerType, srchGroup, season, dateRange) : Promise.resolve(null),
          // Leaderboard statcast: full season, or fallback for stats with no searchCol
          (!useSearch && needsLbEp('statcast')) || needsLbEvenWithSearch
            ? fetchSavantLeaderboard(lbType, 'statcast', season) : Promise.resolve(null),
          // Leaderboard expected_statistics: full season, or fallback for xERA (no searchCol)
          (!useSearch && needsLbEp('expected_statistics')) || (needsLbEvenWithSearch && needsLbEp('expected_statistics'))
            ? fetchSavantLeaderboard(lbType, 'expected_statistics', season) : Promise.resolve(null),
          // Bat tracking leaderboard: hitters or pitchers (against), always full-season
          needsBatTracking ? fetchSavantBatTracking(season, playerType) : Promise.resolve(null),
          // Batted-ball direction leaderboard: always full-season, player-level
          needsBattedBall ? fetchSavantBattedBall(season, playerType) : Promise.resolve(null),
          // Custom leaderboard: player-level only (e.g. xwOBACON)
          needsCustom ? fetchSavantCustom(playerType, season, [...new Set(customSelections)]) : Promise.resolve(null),
        ]);
        currentData = applySavantRows(currentData, { search: srchRows, statcast: scRows, expected: expRows, batTracking: btRows, battedBall: bbRows, custom: customRows }, isTeam, '', skipKeys, useSearch);
      }
    } catch (savantErr) {
      console.warn('Baseball Savant enrichment failed — using FanGraphs data:', savantErr.message);
    }

    // Post-Savant derived stats (need both Savant and FG fields to be present)
    for (const p of currentData) {
      // Barrel/PA% — stored as 0-1 fraction (like other PCT_KEYS) so displayVal ×100 works correctly
      p['BarrelPA%'] = (p.PA || 0) > 0 ? (p.Barrels || 0) / (p.PA || 0) : null;
    }

    // Adjusted Barrel enrichment — fetched from @collinmyshot's public Google Sheet,
    // matched to currentData by normalized player name.
    if (isHitting && !isTeam && axisKeys.some(k => ABARREL_KEYS.has(baseKey(k)))) {
      try {
        const aBarrelMap = await fetchABarrelData();
        for (const p of currentData) {
          const key = _normName(p.PlayerName || p.Name || '');
          const ab = aBarrelMap.get(key);
          p['aBarrels']    = ab?.aBarrels   ?? null;
          p['aBarrel%']    = ab?.aBarrelBBE ?? null;
          p['aBarrelPA%']  = ab?.aBarrelPA  ?? null;
        }
      } catch (aBarrelErr) {
        console.warn('aBarrel fetch failed:', aBarrelErr.message);
      }
    }

    // BP Hitting enrichment — hitter mode only, matched by xMLBAMID
    if (isHitting && !isTeam && axisKeys.some(k => BP_HITTING_KEYS.has(baseKey(k)))) {
      try {
        const bpHitMap = await fetchBPHitting(season);
        for (const p of currentData) {
          const mlbid = String(p.xMLBAMID || '');
          const bh = bpHitMap.get(mlbid);
          p['SLGCON']    = bh?.SLGCON    ?? null;
          p['EV90']      = bh?.EV90      ?? null;
          p['BP_SEAGER'] = bh?.BP_SEAGER ?? null;
        }
      } catch (bpHitErr) {
        console.warn('BP Hitting fetch failed:', bpHitErr.message);
      }
    }

    // BP Arsenal Pro enrichment — pitcher mode only, matched by xMLBAMID
    if (!isHitting && !isTeam && axisKeys.some(k => BP_ARSENAL_KEYS.has(baseKey(k)))) {
      try {
        const bpMap = await fetchBPArsenal(season);
        for (const p of currentData) {
          const mlbid = String(p.xMLBAMID || '');
          const bp = bpMap.get(mlbid);
          p['StuffPro']       = bp?.StuffPro       ?? null;
          p['PitchPro']       = bp?.PitchPro        ?? null;
          p['SurpriseFactor'] = bp?.SurpriseFactor  ?? null;
          p['MovementSpread'] = bp?.MovementSpread  ?? null;
          p['VelocitySpread'] = bp?.VelocitySpread  ?? null;
          p['PitchTypeProb']  = bp?.PitchTypeProb   ?? null;
          p['ExpSwStr']       = bp?.ExpSwStr         ?? null;
          p['ExpDamage']      = bp?.ExpDamage        ?? null;
        }
      } catch (bpErr) {
        console.warn('BP Arsenal fetch failed:', bpErr.message);
      }
    }

    currentXKey = selX.value;
    currentYKey = selY.value;
    currentColorKey = selColor.value;
    chartStatus.style.display = 'none';
    exportBtns.style.display = 'flex';
    sizeToggle.style.display = 'flex';
    rerenderLayout();
  } catch (e) {
    chartStatus.textContent = `Error: ${e.message}`;
    chartStatus.classList.add('error');
    chartStatus.style.display = 'flex';
    currentData = null;
  } finally {
    btnGenerate.disabled = false;
  }
}

function rerenderLayout() {
  if (!currentData) return;
  plotArea.innerHTML = '';

  const xKey = currentXKey;
  const yKey = currentYKey;

  const isTeamMode = currentGroupBy === 'team';

  function dotKey(p) {
    return isTeamMode ? p.TeamNameAbb : (p.playerid || p.xMLBAMID);
  }

  // Filter valid data (exclude hidden)
  const valid = currentData.filter(p => {
    const xv = p[xKey], yv = p[yKey];
    if (xv == null || yv == null || !isFinite(xv) || !isFinite(yv)) return false;
    if (hiddenKeys.has(dotKey(p))) return false;
    if (isTeamMode) return true;
    return p.xMLBAMID && p.xMLBAMID !== 0;
  });

  if (!valid.length) {
    chartStatus.textContent = 'No valid data for selected axes';
    chartStatus.style.display = 'flex';
    return;
  }

  // Axis labels
  const xLabel = STAT_OPTIONS.find(s => s.key === xKey)?.label || xKey;
  const yLabel = yKey === '__prev_year__'
    ? `${currentPrevYearSeason ?? parseInt(selSeason.value) - 1} ${xLabel}`
    : (STAT_OPTIONS.find(s => s.key === yKey)?.label || yKey);
  axisLabelX.textContent = xLabel;
  axisLabelY.textContent = yLabel;

  // Compute full data ranges
  let xMin = Infinity, xMax = -Infinity, yMin = Infinity, yMax = -Infinity;
  for (const p of valid) {
    const xv = displayVal(p[xKey], xKey), yv = displayVal(p[yKey], yKey);
    if (xv < xMin) xMin = xv; if (xv > xMax) xMax = xv;
    if (yv < yMin) yMin = yv; if (yv > yMax) yMax = yv;
  }

  // Override with zoom range or add padding
  if (zoomState) {
    xMin = zoomState.xMin; xMax = zoomState.xMax;
    yMin = zoomState.yMin; yMax = zoomState.yMax;
  } else {
    const xPad = (xMax - xMin) * 0.05 || 0.5;
    const yPad = (yMax - yMin) * 0.05 || 0.5;
    xMin -= xPad; xMax += xPad;
    yMin -= yPad; yMax += yPad;
  }

  // When zoomed, only render dots within the view
  const visible = zoomState ? valid.filter(p => {
    const xv = displayVal(p[xKey], xKey), yv = displayVal(p[yKey], yKey);
    return xv >= xMin && xv <= xMax && yv >= yMin && yv <= yMax;
  }) : valid;

  // Averages from visible set
  let xSum = 0, ySum = 0;
  for (const p of visible) { xSum += displayVal(p[xKey], xKey); ySum += displayVal(p[yKey], yKey); }
  const xAvg = xSum / (visible.length || 1);
  const yAvg = ySum / (visible.length || 1);

  // Color ring range — compute min/max/avg of the color stat across ALL valid players (not just visible)
  const colorKey = currentColorKey !== 'none' ? currentColorKey : null;
  let cMin = Infinity, cMax = -Infinity, cSum = 0, cCount = 0;
  if (colorKey) {
    for (const p of valid) {
      const cv = displayVal(p[colorKey], colorKey);
      if (cv == null || !isFinite(cv)) continue;
      if (cv < cMin) cMin = cv;
      if (cv > cMax) cMax = cv;
      cSum += cv; cCount++;
    }
  }
  const cAvg = cCount > 0 ? cSum / cCount : null;
  const cRange = (cMax - cMin) || 1;

  // Plot dimensions — only reserve right-side space for legend if a dot would land under it
  const rawPlotW = plotArea.clientWidth;
  const plotH = Math.max(400, window.innerHeight - 300);
  let needsLegendReserve = false;
  if (colorKey && cCount > 0) {
    const legX = rawPlotW - 145, legH = 140;
    needsLegendReserve = visible.some(p => {
      const xv = displayVal(p[xKey], xKey), yv = displayVal(p[yKey], yKey);
      if (!isFinite(xv) || !isFinite(yv)) return false;
      const px = ((xv - xMin) / (xMax - xMin)) * rawPlotW;
      const py = (1 - (yv - yMin) / (yMax - yMin)) * plotH;
      return px > legX && py < legH;
    });
  }
  const plotW = rawPlotW - (needsLegendReserve ? 135 : 0);
  plotArea.style.height = plotH + 'px';
  currentScale = { xMin, xMax, yMin, yMax, plotW, plotH };

  // Dot size — scaled by currentDotScale (S/M/L toggle); larger base for team logos
  const baseDotSize = isTeamMode
    ? Math.round(Math.min(44, Math.max(36, plotW / 28)))
    : Math.round(Math.min(36, Math.max(32, plotW / 40)));
  const dotSize = Math.round(baseDotSize * currentDotScale);

  // Nice tick generation
  function niceTicks(min, max, count) {
    const range = max - min;
    const rough = range / count;
    const mag = Math.pow(10, Math.floor(Math.log10(rough)));
    const nice = [1, 2, 2.5, 5, 10].find(n => n * mag >= rough) * mag;
    const start = Math.ceil(min / nice) * nice;
    const ticks = [];
    for (let t = start; t <= max + nice * 0.001; t += nice) {
      ticks.push(Math.round(t * 1e6) / 1e6);
    }
    return ticks;
  }

  const xTicks = niceTicks(xMin, xMax, 8);
  const yTicks = niceTicks(yMin, yMax, 6);

  // Grid lines + tick labels
  for (const t of xTicks) {
    const pct = (t - xMin) / (xMax - xMin);
    const px = pct * plotW;
    const gl = document.createElement('div');
    gl.className = 'grid-line grid-line-v';
    gl.style.left = px + 'px';
    plotArea.appendChild(gl);
    const tl = document.createElement('div');
    tl.className = 'tick-label tick-label-x';
    tl.style.left = px + 'px';
    tl.textContent = formatStat(t, xKey);
    plotArea.appendChild(tl);
  }
  for (const t of yTicks) {
    const pct = 1 - (t - yMin) / (yMax - yMin);
    const py = pct * plotH;
    const gl = document.createElement('div');
    gl.className = 'grid-line grid-line-h';
    gl.style.top = py + 'px';
    plotArea.appendChild(gl);
    const tl = document.createElement('div');
    tl.className = 'tick-label tick-label-y';
    tl.style.top = py + 'px';
    tl.textContent = formatStat(t, yKey);
    plotArea.appendChild(tl);
  }

  // Average lines
  const xAvgPx = ((xAvg - xMin) / (xMax - xMin)) * plotW;
  const yAvgPx = (1 - (yAvg - yMin) / (yMax - yMin)) * plotH;

  const avgLineX = document.createElement('div');
  avgLineX.className = 'avg-line avg-line-x';
  avgLineX.style.left = xAvgPx + 'px';
  plotArea.appendChild(avgLineX);

  const avgLabelX = document.createElement('div');
  avgLabelX.className = 'avg-label avg-label-x';
  avgLabelX.style.left = xAvgPx + 'px';
  avgLabelX.textContent = `avg ${formatStat(xAvg, xKey)}`;
  plotArea.appendChild(avgLabelX);

  const avgLineY = document.createElement('div');
  avgLineY.className = 'avg-line avg-line-y';
  avgLineY.style.top = yAvgPx + 'px';
  plotArea.appendChild(avgLineY);

  const avgLabelY = document.createElement('div');
  avgLabelY.className = 'avg-label avg-label-y';
  avgLabelY.style.top = yAvgPx + 'px';
  avgLabelY.textContent = `avg ${formatStat(yAvg, yKey)}`;
  plotArea.appendChild(avgLabelY);

  // Diagonal y=x reference line (only for Prev Year comparison)
  if (yKey === '__prev_year__') {
    // Find where y=x clips to the visible [xMin,xMax] × [yMin,yMax] box
    const diagStart = Math.max(xMin, yMin);
    const diagEnd   = Math.min(xMax, yMax);
    if (diagEnd > diagStart) {
      const x1 = ((diagStart - xMin) / (xMax - xMin)) * plotW;
      const y1 = (1 - (diagStart - yMin) / (yMax - yMin)) * plotH;
      const x2 = ((diagEnd   - xMin) / (xMax - xMin)) * plotW;
      const y2 = (1 - (diagEnd   - yMin) / (yMax - yMin)) * plotH;
      const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
      svg.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;pointer-events:none;overflow:visible;';
      const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
      line.setAttribute('x1', x1); line.setAttribute('y1', y1);
      line.setAttribute('x2', x2); line.setAttribute('y2', y2);
      line.setAttribute('stroke', '#999');
      line.setAttribute('stroke-width', '1.5');
      line.setAttribute('stroke-dasharray', '5 4');
      line.setAttribute('stroke-linecap', 'round');
      svg.appendChild(line);
      plotArea.appendChild(svg);
    }
  }

  // R² regression line
  if (chkR2.checked && visible.length >= 2 && yKey !== '__prev_year__') {
    const points = visible
      .map(p => [displayVal(p[xKey], xKey), displayVal(p[yKey], yKey)])
      .filter(([x, y]) => isFinite(x) && isFinite(y));
    const reg = linearRegression(points);
    if (reg) {
      // Compute line endpoints clipped to visible range
      const x1 = xMin, y1 = reg.m * xMin + reg.b;
      const x2 = xMax, y2 = reg.m * xMax + reg.b;
      const toPlot = (x, y) => [
        ((x - xMin) / (xMax - xMin)) * plotW,
        (1 - (y - yMin) / (yMax - yMin)) * plotH,
      ];
      const [px1, py1] = toPlot(x1, Math.max(yMin, Math.min(yMax, y1)));
      const [px2, py2] = toPlot(x2, Math.max(yMin, Math.min(yMax, y2)));
      const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
      svg.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;pointer-events:none;overflow:visible;';
      const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
      line.setAttribute('x1', px1); line.setAttribute('y1', py1);
      line.setAttribute('x2', px2); line.setAttribute('y2', py2);
      line.setAttribute('stroke', '#4a90d9');
      line.setAttribute('stroke-width', '1.5');
      line.setAttribute('stroke-dasharray', '6 3');
      line.setAttribute('stroke-linecap', 'round');
      svg.appendChild(line);
      // R² label — pinned just outside the right edge of the plot so headshots never cover it
      const label = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      const lx = plotW + 6, ly = Math.max(14, Math.min(plotH - 4, py2));
      label.setAttribute('x', lx); label.setAttribute('y', ly);
      label.setAttribute('text-anchor', 'start');
      label.setAttribute('font-size', '11');
      label.setAttribute('font-family', 'inherit');
      label.setAttribute('fill', '#4a90d9');
      label.setAttribute('font-weight', '500');
      label.textContent = `R² = ${reg.r2.toFixed(3)}`;
      svg.appendChild(label);
      plotArea.appendChild(svg);
    }
  }

  // Color ring legend
  if (colorKey && cCount > 0) {
    const colorLabel = STAT_OPTIONS.find(s => s.key === colorKey)?.label || colorKey;
    const legend = document.createElement('div');
    legend.style.cssText = `
      position:absolute; top:10px; right:10px; z-index:20;
      background:rgba(255,255,255,0.93); border:1px solid rgba(0,0,0,0.08);
      border-radius:10px; padding:10px 13px; font-size:11px; line-height:1.4;
      box-shadow:0 2px 8px rgba(0,0,0,0.08); pointer-events:none; min-width:100px;
    `;
    const barH = 72;
    legend.innerHTML = `
      <div style="font-weight:600;margin-bottom:8px;color:#333;">${colorLabel}</div>
      <div style="display:flex;gap:8px;align-items:stretch;">
        <div style="width:10px;height:${barH}px;border-radius:5px;flex-shrink:0;
          background:linear-gradient(to top,${lowerIsBetter(colorKey) ? ringColor(1)+','+ringColor(0.5)+','+ringColor(0) : ringColor(0)+','+ringColor(0.5)+','+ringColor(1)});"></div>
        <div style="display:flex;flex-direction:column;justify-content:space-between;height:${barH}px;color:#555;">
          <span>${formatStat(cMax, colorKey)}</span>
          <span style="color:#999;">${formatStat(cAvg, colorKey)} avg</span>
          <span>${formatStat(cMin, colorKey)}</span>
        </div>
      </div>
    `;
    plotArea.appendChild(legend);
  }

  // Dots (player headshots or team logos)
  const half = dotSize / 2;
  const isTouch = window.matchMedia('(hover: none) and (pointer: coarse)').matches;
  for (const p of visible) {
    const xPct = (displayVal(p[xKey], xKey) - xMin) / (xMax - xMin);
    const yPct = 1 - (displayVal(p[yKey], yKey) - yMin) / (yMax - yMin);
    const left = xPct * plotW - half;
    const top = yPct * plotH - half;

    const dot = document.createElement('div');
    dot.className = 'player-dot' + (isTeamMode ? ' team-dot' : '');
    dot.style.width = dotSize + 'px';
    dot.style.height = dotSize + 'px';
    dot.style.left = left + 'px';
    dot.style.top = top + 'px';

    // Color ring
    if (colorKey) {
      const cv = displayVal(p[colorKey], colorKey);
      if (cv != null && isFinite(cv)) {
        const tRaw = (cv - cMin) / cRange;
        const t = lowerIsBetter(colorKey) ? 1 - tRaw : tRaw;
        if (isTeamMode) {
          // Team logos: translucent filled circle behind the logo (slightly smaller than logo)
          const circle = document.createElement('div');
          const inset = -Math.round(dotSize * 0.04);
          circle.style.cssText = `position:absolute;inset:${inset}px;border-radius:50%;background:${ringColor(t)};opacity:0.4;z-index:-1;`;
          dot.appendChild(circle);
        } else {
          // Player headshots: colored ring as a sibling div (box-shadow clips in html2canvas)
          const ringW = Math.max(2, Math.round(dotSize * 0.09));
          const ring = document.createElement('div');
          ring.className = 'dot-ring';
          ring.style.width  = (dotSize + ringW * 2) + 'px';
          ring.style.height = (dotSize + ringW * 2) + 'px';
          ring.style.left   = (left - ringW) + 'px';
          ring.style.top    = (top  - ringW) + 'px';
          ring.style.border = `${ringW}px solid ${ringColor(t)}`;
          plotArea.appendChild(ring);
        }
      }
    }

    const img = document.createElement('img');
    if (isTeamMode) {
      img.src = teamLogoUrl(p.TeamNameAbb);
      img.alt = p.TeamNameAbb;
    } else {
      img.src = headshotUrl(p.xMLBAMID);
      img.alt = p.PlayerName;
    }
    img.loading = 'lazy';
    dot.appendChild(img);

    // Tooltip events
    dot.addEventListener('mouseenter', (e) => showTooltip(e, p, xKey, yKey, xLabel, yLabel));
    dot.addEventListener('mousemove', moveTooltip);
    dot.addEventListener('mouseleave', hideTooltip);

    // Click to dismiss (touch: require two taps so first tap can show tooltip)
    dot.addEventListener('click', (e) => {
      if (justDragged) return;
      const key = dotKey(p);
      if (isTouch) {
        if (tappedDotKey === key) {
          tappedDotKey = null;
          hideTooltip();
          hiddenKeys.add(key);
          btnReset.style.display = 'block';
          rerenderLayout();
        } else {
          tappedDotKey = key;
          showTooltip(e, p, xKey, yKey, xLabel, yLabel);
        }
      } else {
        hiddenKeys.add(key);
        btnReset.style.display = 'block';
        rerenderLayout();
      }
    });

    plotArea.appendChild(dot);
  }
}

// Percentage keys come back as decimals (0.32 = 32%) — convert for display
const PCT_KEYS = new Set([
  'K%','BB%','K-BB%','LOB%','GB%','FB%','HR/FB','SwStr%','IFFB%','LD%',
  'O-Swing%','Z-Swing%','Swing%','O-Contact%','Z-Contact%','Contact%','Zone%','F-Strike%',
  'CStr%','C+SwStr%','IFH%','BUH%','TTO%',
  'pfxFA%','pfxFT%','pfxFC%','pfxFS%','pfxFO%','pfxSI%','pfxSL%','pfxCU%',
  'pfxKC%','pfxEP%','pfxCH%','pfxSC%','pfxKN%','pfxUN%',
  // Batting-specific percentages
  'Pull%','Cent%','Oppo%','Soft%','Med%','Hard%',
  'Barrel%','BarrelPA%','aBarrel%','aBarrelPA%','HardHit%',
  // Bat tracking rates (stored as fractions 0–1)
  'FastSwing%','Blasts/C','Blasts/Sw','SqUp/C','SqUp/Sw',
  // BP Arsenal Pro rates (stored as fractions 0–1)
  'ExpSwStr',
  // Batted-ball direction rates (stored as fractions 0–1)
  'PullAir%','PullGB%','OppoAir%','OppoGB%',
]);

// Strip hit_/pit_ prefix for format lookups.
// __prev_year__ delegates to currentXKey so all formatting/pct logic works transparently.
function baseKey(key) {
  if (key === '__prev_year__') return currentXKey ? baseKey(currentXKey) : key;
  return key.replace(/^(hit_|pit_)/, '');
}

// Counting stats where a null API response means 0, not "no data"
const COUNTING_KEYS = new Set(['W','L','G','GS','CG','ShO','SV','HLD','SV+HLD','SV+HLD+W','BS','TBF','H','R','ER','HR','BB','IBB','HBP','WP','BK','SO','GB','FB','LD','IFFB','Pitches','Balls','Strikes','RS','IFH','BU','BUH','SD','MD','AB','PA','1B','2B','3B','RBI','SF','SH','GDP','SB','CS','SB+CS','TOB','Swords','Barrels','HardHit','aBarrels']);

function displayVal(val, key) {
  // FanGraphs sometimes returns null for counting stats (e.g. HLD) instead of 0.
  // Treat that as 0 so players aren't incorrectly excluded from the chart.
  if (val == null) return COUNTING_KEYS.has(baseKey(key)) ? 0 : val;
  return PCT_KEYS.has(baseKey(key)) ? val * 100 : val;
}

// Linear regression: returns { m, b, r2 } for y = m*x + b
function linearRegression(points) {
  const n = points.length;
  if (n < 2) return null;
  let sumX = 0, sumY = 0, sumXY = 0, sumXX = 0;
  for (const [x, y] of points) { sumX += x; sumY += y; sumXY += x*y; sumXX += x*x; }
  const denom = n * sumXX - sumX * sumX;
  if (denom === 0) return null;
  const m = (n * sumXY - sumX * sumY) / denom;
  const b = (sumY - m * sumX) / n;
  const yMean = sumY / n;
  let ssTot = 0, ssRes = 0;
  for (const [x, y] of points) { ssTot += (y - yMean) ** 2; ssRes += (y - (m*x + b)) ** 2; }
  const r2 = ssTot === 0 ? 0 : 1 - ssRes / ssTot;
  return { m, b, r2 };
}

// Map a 0–1 fraction to a red→yellow→green color (for color ring legend)
function ringColor(t) {
  const h = Math.round(t * 120); // 0 = red, 60 = yellow, 120 = green
  return `hsl(${h}, 80%, 42%)`;
}

// Stats where a lower value is better (color ring should invert: red=high, green=low)
const LOWER_IS_BETTER_ALWAYS = new Set([
  'ERA','FIP','xFIP','SIERA','xERA',
  'WHIP','H/9','BB/9','HR/9',
  'ERA-','FIP-','xFIP-',
  'L','BS','-WPA',
]);
const LOWER_IS_BETTER_PITCHING = new Set(['BB%','BABIP','HBP','HR/FB','wOBA','xwOBA','xwOBACON','xSLG','Barrel%','BarrelPA%','Barrels','HardHit%','HardHit','EV','maxEV',
  'BatSpeed','FastSwing%','Blasts/C','Blasts/Sw','SqUp/C','SqUp/Sw','SwingLen',
  'ExpDamage','PitchTypeProb','StuffPro','PitchPro']);
const LOWER_IS_BETTER_HITTING  = new Set(['K%','GDP','CS','SwStr%']);

function lowerIsBetter(key) {
  const bk = baseKey(key);
  if (LOWER_IS_BETTER_ALWAYS.has(bk)) return true;
  // In combined mode, use the key prefix (hit_/pit_) to determine context
  // so that e.g. hit_wOBA (higher=better for hitters) and pit_wOBA (lower=better for pitchers)
  // are handled correctly rather than both being treated as pitcher context.
  const isPitcher = currentMode === 'pitching' || (currentMode === 'combined' && key.startsWith('pit_'));
  const isHitter  = currentMode === 'hitting'  || (currentMode === 'combined' && key.startsWith('hit_'));
  if (isPitcher && LOWER_IS_BETTER_PITCHING.has(bk)) return true;
  if (isHitter  && LOWER_IS_BETTER_HITTING.has(bk))  return true;
  return false;
}

// Stats displayed as .xxx (batting average format)
const SLASH_KEYS = new Set(['AVG','OBP','SLG','OPS','ISO','wOBA','wOBACON','xwOBA','xSLG','xwOBACON','sSEAGER','BABIP','SLGCON']);

// formatStat expects already-converted display values (pct already *100)
function formatStat(v, key) {
  const bk = baseKey(key);
  if (SLASH_KEYS.has(bk)) return v.toFixed(3);
  if (PCT_KEYS.has(bk)) return v.toFixed(1) + '%';
  if (['ERA','FIP','xFIP','SIERA','xERA','WHIP','HR/9','BB/9','K/9','H/9','K/BB','GB/FB','Spd','BB/K'].includes(bk)) return v.toFixed(2);
  if (['WAR','IP','Start-IP','Relief-IP','WPA','-WPA','+WPA','Starting','Relieving','RAR','Batting','Offense','BaseRunning','RE24','Clutch','Dollars','EV','EV50','EV90','LA','maxEV','SprintSpeed','wRAA','wRC','BatSpeed','SwingLen','AttackAngle','AttackDir','SwingTilt',
       'StuffPro','PitchPro','SurpriseFactor','MovementSpread','VelocitySpread','PitchTypeProb','ExpDamage','BP_SEAGER'].includes(bk)) return v.toFixed(1);
  if (['ERA-','FIP-','xFIP-','sp_stuff','sp_location','sp_pitching','wRC+','AVG+','BB%+','K%+','OBP+','SLG+','ISO+','BABIP+'].includes(bk)) return Math.round(v);
  if (bk.startsWith('pfxv')) return v.toFixed(1);
  if (['Age'].includes(bk)) return v.toFixed(0);
  if (COUNTING_KEYS.has(bk)) return Math.round(v);
  if (key === 'total_WAR') return v.toFixed(1);
  return Number.isInteger(v) ? v : v.toFixed(2);
}

function showTooltip(e, player, xKey, yKey, xLabel, yLabel) {
  ttName.textContent = player.PlayerName;
  const isHit = currentMode === 'hitting';
  if (player._isTeam) {
    if (currentMode === 'combined') {
      ttMeta.textContent = `${player._hitterCount || 0} hitters  |  ${player._pitcherCount || 0} pitchers`;
    } else {
      const vol = isHit ? `${Math.round(player.PA || 0)} PA` : `${formatStat(player.IP || 0, 'IP')} IP`;
      ttMeta.textContent = vol;
    }
  } else {
    const hand = isHit ? (player.Bats || '') : (player.Throws || '');
    const vol = isHit ? `${Math.round(player.PA || 0)} PA` : `${formatStat(player.IP || 0, 'IP')} IP`;
    ttMeta.textContent = `${player.TeamName || player.TeamNameAbb || ''}  |  ${hand}  |  ${vol}`;
  }
  const colorLabel = currentColorKey !== 'none' ? (STAT_OPTIONS.find(s => s.key === currentColorKey)?.label || currentColorKey) : null;
  const colorVal = colorLabel != null ? displayVal(player[currentColorKey], currentColorKey) : null;
  // Delta row for prev-year comparisons
  let deltaHtml = '';
  if (yKey === '__prev_year__') {
    const xDv  = displayVal(player[xKey], xKey);
    const pyDv = displayVal(player['__prev_year__'], '__prev_year__');
    if (xDv != null && isFinite(xDv) && pyDv != null && isFinite(pyDv)) {
      const delta = xDv - pyDv;
      const improving = lowerIsBetter(xKey) ? delta < 0 : delta > 0;
      const deltaColor = delta === 0 ? '#999' : (improving ? '#2e9e6b' : '#d04040');
      const sign = delta > 0 ? '+' : delta < 0 ? '−' : '';
      const deltaStr = sign + formatStat(Math.abs(delta), xKey);
      deltaHtml = `<div class="tooltip-stat"><span class="tooltip-stat-label">Δ</span><span class="tooltip-stat-value" style="color:${deltaColor}">${deltaStr}</span></div>`;
    }
  }
  ttStats.innerHTML = `
    <div class="tooltip-stat"><span class="tooltip-stat-label">${xLabel}</span><span class="tooltip-stat-value">${formatStat(displayVal(player[xKey], xKey), xKey)}</span></div>
    <div class="tooltip-stat"><span class="tooltip-stat-label">${yLabel}</span><span class="tooltip-stat-value">${formatStat(displayVal(player[yKey], yKey), yKey)}</span></div>
    ${deltaHtml}
    ${colorLabel != null && colorVal != null && isFinite(colorVal) ? `<div class="tooltip-stat"><span class="tooltip-stat-label">${colorLabel}</span><span class="tooltip-stat-value">${formatStat(colorVal, currentColorKey)}</span></div>` : ''}
  `;
  tooltip.style.display = 'block';
  moveTooltip(e);
}

function moveTooltip(e) {
  const pad = 14;
  let x = e.clientX + pad;
  let y = e.clientY + pad;
  const tw = tooltip.offsetWidth;
  const th = tooltip.offsetHeight;
  if (x + tw > window.innerWidth - 8) x = e.clientX - tw - pad;
  if (y + th > window.innerHeight - 8) y = e.clientY - th - pad;
  tooltip.style.left = x + 'px';
  tooltip.style.top = y + 'px';
}

function hideTooltip() {
  tooltip.style.display = 'none';
}

async function exportPNG() {
  const chartCard = document.querySelector('.chart-card');
  if (!chartCard) return;

  const origLabel = btnPng.textContent;
  btnPng.textContent = 'Rendering…';
  btnPng.disabled = true;

  try {
    const canvas = await html2canvas(chartCard, {
      scale: 2,
      useCORS: true,
      backgroundColor: '#ffffff',
      logging: false,
      // html2canvas doesn't apply parent overflow:hidden+border-radius to child imgs.
      // In the cloned DOM (never touches the live site), swap each headshot img for a
      // background-image on the dot div itself — border-radius clips bg-images correctly.
      onclone: (_doc, el) => {
        el.querySelectorAll('.player-dot').forEach(dot => {
          const img = dot.querySelector('img');
          if (!img) return;
          // Use a higher-res version of the image (w_60 → w_200) to avoid fuzz at 2× export scale
          const hiResSrc = img.src.replace(/\/w_\d+/, '/w_200');
          dot.style.backgroundImage    = `url("${hiResSrc}")`;
          dot.style.backgroundSize     = 'cover';
          dot.style.backgroundPosition = 'center';
          img.style.display = 'none';
        });
      },
    });
    const xLabel  = (currentXKey || 'x').replace(/[^a-zA-Z0-9%+\-]/g, '_');
    const yLabel  = (currentYKey || 'y').replace(/[^a-zA-Z0-9%+\-]/g, '_');
    const season  = selSeason.value || '';
    const link    = document.createElement('a');
    link.download = `scatter_${xLabel}_vs_${yLabel}_${season}.png`;
    link.href     = canvas.toDataURL('image/png');
    link.click();
  } catch (e) {
    console.error('PNG export failed:', e);
  } finally {
    btnPng.textContent = origLabel;
    btnPng.disabled    = false;
  }
}

function downloadCSV() {
  if (!currentData) return;
  const isTeamMode = currentGroupBy === 'team';

  // Same visibility filter as the chart
  function dotKey(p) { return isTeamMode ? p.TeamNameAbb : (p.playerid || p.xMLBAMID); }
  const rows = currentData.filter(p => {
    if (hiddenKeys.has(dotKey(p))) return false;
    if (!isTeamMode && (!p.xMLBAMID || p.xMLBAMID === 0)) return false;
    return true;
  });
  if (!rows.length) return;

  // Only the two axes shown on the chart
  const xLabel = STAT_OPTIONS.find(s => s.key === currentXKey)?.label || currentXKey;
  const yLabel = STAT_OPTIONS.find(s => s.key === currentYKey)?.label || currentYKey;
  const colorLabel = currentColorKey !== 'none' ? (STAT_OPTIONS.find(s => s.key === currentColorKey)?.label || currentColorKey) : null;

  // Header row
  const isPrevYear = currentYKey === '__prev_year__';
  const headers = isTeamMode ? ['Team'] : ['Name', 'Team'];
  headers.push(xLabel, yLabel);
  if (isPrevYear) headers.push('Delta');
  if (colorLabel) headers.push(colorLabel);

  // Data rows — only include rows with valid x and y values
  const csvRows = [headers.join(',')];
  for (const p of rows) {
    const xv = p[currentXKey], yv = p[currentYKey];
    if (xv == null || !isFinite(xv) || yv == null || !isFinite(yv)) continue;
    const cols = [];
    if (!isTeamMode) cols.push(JSON.stringify(p.PlayerName || ''));
    cols.push(JSON.stringify(p.TeamNameAbb || p.TeamName || ''));
    cols.push(formatStat(displayVal(xv, currentXKey), currentXKey));
    cols.push(formatStat(displayVal(yv, currentYKey), currentYKey));
    if (isPrevYear) {
      const xDv = displayVal(xv, currentXKey);
      const pyDv = displayVal(yv, currentYKey);
      const delta = xDv - pyDv;
      const sign = delta > 0 ? '+' : delta < 0 ? '-' : '';
      cols.push(sign + formatStat(Math.abs(delta), currentXKey));
    }
    if (colorLabel) {
      const cv = p[currentColorKey];
      cols.push(cv != null && isFinite(cv) ? formatStat(displayVal(cv, currentColorKey), currentColorKey) : '');
    }
    csvRows.push(cols.join(','));
  }

  const split = selSplit.options[selSplit.selectedIndex].text.replace(/\s+/g, '-');
  const blob = new Blob(['﻿' + csvRows.join('\n')], { type: 'text/csv;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `fg-${currentMode}-${selSeason.value}-${split}.csv`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}
