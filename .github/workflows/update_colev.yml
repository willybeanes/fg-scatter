name: Update CoLev

on:
  schedule:
    # Every day at 8am UTC during baseball season (roughly Apr–Oct)
    - cron: '0 8 * * *'
  workflow_dispatch:
    # Also allow manual runs from the GitHub Actions tab

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 60   # Statcast pulls can take 20–30 min for a full season

    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Compute and upload CoLev
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python scripts/compute_colev.py
